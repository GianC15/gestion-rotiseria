<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Deudores — Lo De Monica</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
</head>
<body>

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div class="page-header">
        <h1>Deudores</h1>
        <p>Clientes con saldo pendiente de pago</p>
    </div>

    <div class="alert alert-success" th:if="${#lists.isEmpty(deudores)}">
        No hay deudores pendientes. Todo al día.
    </div>

    <div class="table-wrapper" th:if="${!#lists.isEmpty(deudores)}">
        <table>
            <thead>
            <tr>
                <th>Cliente</th>
                <th class="col-hide">Semana</th>
                <th class="col-hide">Total</th>
                <th class="col-hide">Pagado</th>
                <th>Debe</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cobro : ${deudores}">
                <td style="font-weight: 500;">
                    <span th:text="${cobro.cliente.nombre}"></span>
                    <div class="fecha-mobile"
                         style="font-size: 12px; color: var(--text-muted); margin-top: 2px;"
                         th:text="${cobro.semana.fechaInicio} + ' — ' + ${cobro.semana.fechaFin}">
                    </div>
                </td>
                <td class="col-hide" th:text="${cobro.semana.fechaInicio} + ' — ' + ${cobro.semana.fechaFin}"
                    style="color: var(--text-muted); font-size: 13px;"></td>
                <td class="col-hide" th:text="'$' + ${cobro.montoTotal}"></td>
                <td class="col-hide" th:text="'$' + ${cobro.montoPagado}"></td>
                <td>
            <span th:text="'$' + ${cobro.montoTotal - cobro.montoPagado}"
                  style="color: var(--danger); font-weight: 600;">
            </span>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="stat-card warn" th:if="${!#lists.isEmpty(deudores)}"
             style="max-width: 300px; margin-top: 20px;">
            <div class="stat-label">Total adeudado</div>
            <div class="stat-value" th:text="'$' + ${totalDeuda}"></div>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <a href="/cobros" class="btn btn-secondary">← Volver a caja</a>
    </div>

</div>

<div th:replace="~{fragments/nav :: navscript}"></div>
</body>
</html>
