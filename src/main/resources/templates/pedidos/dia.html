<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pedidos del día — Lo De Monica</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
    <style>
        .pedido-items { display: flex; flex-direction: column; gap: 4px; }
        .pedido-item-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .cantidad { font-weight: 600; color: var(--primary); font-size: 13px; min-width: 24px; }
        @media (max-width: 640px) {
            .col-hide { display: none; }
            .form-pedido-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div class="page-header">
        <h1>Pedidos del día</h1>
        <p th:text="${fecha}"></p>
    </div>

    <div class="alert alert-warning" th:if="${menuDia == null}">
        No hay menú cargado para este día.
        <a th:href="@{/menu/{fecha}(fecha=${fecha})}">Crear menú</a>
    </div>

    <div th:if="${menuDia != null}">

        <!-- Pizarrón digital -->
        <div class="table-wrapper" style="margin-bottom: 24px;">
            <table>
                <thead>
                <tr>
                    <th style="width: 35%;">Cliente</th>
                    <th>Pedido</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cliente : ${clientes}">
                    <td style="font-weight: 500; vertical-align: top; padding-top: 16px;">
                        <span th:text="${cliente.nombre}"></span>
                    </td>
                    <td>
                        <div class="pedido-items">
                            <div th:each="pedido : ${pedidos}"
                                 th:if="${pedido.cliente.id == cliente.id}">
                                <div th:each="item : ${pedido.items}"
                                     class="pedido-item-row">
                                    <div class="pedido-item-info">
                                        <span class="cantidad" th:text="${item.cantidad} + 'x'"></span>
                                        <span th:text="${item.platoPrincipal?.nombre}"
                                              class="badge badge-principal"></span>
                                        <span th:if="${item.guarnicion != null}"
                                              th:text="'+ ' + ${item.guarnicion.nombre}"
                                              class="badge badge-guarnicion"></span>
                                    </div>
                                    <form th:action="@{/pedidos/quitar-item/{pedidoId}/{itemId}(pedidoId=${pedido.id},itemId=${item.id})}"
                                          method="get"
                                          style="display:inline;">
                                        <button type="submit" class="btn-eliminar" title="Eliminar">&#x2715;</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Resumen de producción -->
        <div class="resumen-card" th:if="${!#maps.isEmpty(resumenProduccion)}">
            <h3>Resumen de producción</h3>
            <div class="table-wrapper" style="margin-top: 12px;">
                <table>
                    <thead>
                    <tr>
                        <th>Plato</th>
                        <th>Total a preparar</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${resumenProduccion}">
                        <td th:text="${entry.key}" style="font-weight: 500;"></td>
                        <td>
                                <span th:text="${entry.value}"
                                      style="font-weight: 700; color: var(--primary); font-size: 18px;">
                                </span>
                            <span style="color: var(--text-muted); font-size: 13px;"> unidades</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Formulario agregar pedido -->
        <div class="card" style="margin-top: 24px;">
            <div class="card-title">Agregar pedido</div>
            <form th:action="@{/pedidos/guardar}" method="post">
                <input type="hidden" name="menuDiaId" th:value="${menuDia.id}"/>
                <input type="hidden" name="fecha" th:value="${fecha}"/>
                <div class="form-row form-pedido-grid">
                    <div class="form-group">
                        <label>Cliente</label>
                        <select name="clienteId" class="form-control" required>
                            <option value="">Seleccioná un cliente</option>
                            <option th:each="c : ${clientes}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Principal</label>
                        <select name="platoPrincipalId" class="form-control" required>
                            <option th:each="p : ${principalesDisponibles}"
                                    th:value="${p.id}"
                                    th:text="${p.nombre}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Guarnición</label>
                        <select name="guarnicionId" class="form-control">
                            <option value="">Sin guarnición</option>
                            <option th:each="g : ${guarnicionsDisponibles}"
                                    th:value="${g.id}"
                                    th:text="${g.nombre}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cantidad</label>
                        <input type="number" name="cantidad" class="form-control"
                               value="1" min="1" max="10"/>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Agregar pedido</button>
            </form>
        </div>

    </div>
</div>

<div th:replace="~{fragments/nav :: navscript}"></div>
</body>
</html>
