<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar sesión — Lo De Monica</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            justify-content: center;
        }
        .login-logo span {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
        }
        .login-logo h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        .login-card h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 24px;
            text-align: center;
        }
        .alert-error {
            background: var(--danger-light);
            border: 1px solid #fca5a5;
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .alert-logout {
            background: var(--success-light);
            border: 1px solid #6ee7b7;
            color: var(--success);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="login-logo">
        <img th:src="@{/images/logo.png}" alt="Lo De Monica" style="height: 60px; width: auto;"/>
    </div>

    <h2>Iniciá sesión para continuar</h2>

    <div class="alert-error" th:if="${param.error}">
        Usuario o contraseña incorrectos.
    </div>

    <div class="alert-logout" th:if="${param.logout}">
        Cerraste sesión correctamente.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Usuario</label>
            <input class="form-control" type="text" name="username"
                   placeholder="Usuario" autofocus required/>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input class="form-control" type="password" name="password"
                   placeholder="Contraseña" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-login">
            Iniciar sesión
        </button>
    </form>

</div>

</body>
</html>
