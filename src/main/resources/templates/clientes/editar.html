<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar cliente — Lo De Monica</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
</head>
<body>

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container">

    <div class="page-header">
        <h1>Editar cliente</h1>
        <p th:text="${cliente.nombre}"></p>
    </div>

    <div class="card">
        <form th:action="@{/clientes/editar/{id}(id=${cliente.id})}"
              th:object="${cliente}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input class="form-control" type="text" th:field="*{nombre}" required/>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input class="form-control" type="text" th:field="*{telefono}"/>
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 8px;">
                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                <a href="/clientes" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>

</div>

<div th:replace="~{fragments/nav :: navscript}"></div>
</body>
</html>
